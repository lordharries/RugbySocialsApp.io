<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c10;
  --surface: #14141c;
  --surface2: #1c1c28;
  --border: #2e2e42;
  --accent: #c8102e;
  --accent2: #f0f0f0;
  --gold: #d4a843;
  --text: #f0f0f0;
  --muted: #777;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  padding: 0 0 80px;
}

/* NAV */
nav {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 40px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

nav img { width: 42px; height: 42px; object-fit: contain; }

.nav-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.1em;
  background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-badge {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
}

/* LAYOUT */
.app {
  display: grid;
  grid-template-columns: 400px 1fr;
  gap: 40px;
  max-width: 1160px;
  margin: 40px auto 0;
  padding: 0 40px;
  align-items: start;
}

/* FORM PANEL */
.form-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 30px;
  position: sticky;
  top: 20px;
}

.form-panel h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 0.1em;
  color: var(--gold);
  margin-bottom: 22px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--muted);
  margin: 22px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.field { margin-bottom: 12px; }

label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: #aaa;
  margin-bottom: 5px;
  letter-spacing: 0.03em;
}

input[type="text"], input[type="number"], select, textarea {
  width: 100%;
  background: #0a0a10;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 0.9rem;
  padding: 9px 12px;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
  appearance: none;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(200,16,46,0.15);
}

.score-row {
  display: grid;
  grid-template-columns: 1fr 40px 1fr;
  gap: 8px;
  align-items: center;
}

.score-row .vs {
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  color: var(--muted);
}

.color-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.color-field {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #0a0a10;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
}

.color-field input[type="color"] {
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 50%;
  padding: 0;
  cursor: pointer;
  background: none;
}

.color-field span {
  font-size: 0.8rem;
  color: #aaa;
}

.result-toggle {
  display: flex;
  gap: 8px;
}

.result-btn {
  flex: 1;
  padding: 9px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.result-btn.win { --btn-color: #2ecc71; }
.result-btn.loss { --btn-color: var(--accent); }
.result-btn.draw { --btn-color: var(--gold); }

.result-btn.active {
  background: var(--btn-color);
  border-color: var(--btn-color);
  color: #fff;
}

.generate-btn {
  width: 100%;
  margin-top: 22px;
  padding: 14px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: transform 0.15s, background 0.2s;
}

.generate-btn:hover { background: #a50d26; transform: translateY(-1px); }
.generate-btn:active { transform: translateY(0); }

/* PREVIEW PANEL */
.preview-panel h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 0.1em;
  color: var(--gold);
  margin-bottom: 22px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

.preview-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 30px;
}

/* THE GENERATED IMAGE */
#match-card {
  width: 100%;
  aspect-ratio: 1/1;
  max-width: 560px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  font-family: 'Bebas Neue', sans-serif;
}

.card-bg {
  position: absolute;
  inset: 0;
  background: #111;
}

.card-diagonal {
  position: absolute;
  inset: 0;
}

.card-noise {
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.5;
  pointer-events: none;
}

.card-inner {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 6%;
}

.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 5%;
}

.card-club-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(0.9rem, 3vw, 1.5rem);
  letter-spacing: 0.12em;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}

.card-logo {
  width: clamp(40px, 10%, 70px);
  height: clamp(40px, 10%, 70px);
  object-fit: contain;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
}

.card-result-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(0.55rem, 1.5vw, 0.75rem);
  font-weight: 900;
  letter-spacing: 0.2em;
  padding: 4px 12px;
  border-radius: 4px;
  text-transform: uppercase;
}

.card-score-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.card-vs-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5%;
  width: 100%;
}

.card-team {
  text-align: center;
  flex: 1;
}

.card-team-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(0.65rem, 2vw, 1rem);
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 12vw, 6rem);
  line-height: 1;
  letter-spacing: 0.02em;
}

.card-divider {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(0.8rem, 2vw, 1.1rem);
  font-weight: 700;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.1em;
  padding: 0 2%;
}

.card-meta {
  text-align: center;
  margin-top: 4%;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(0.55rem, 1.5vw, 0.8rem);
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}

.card-message {
  text-align: center;
  margin-top: 6%;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1rem, 3.5vw, 1.8rem);
  letter-spacing: 0.06em;
  line-height: 1.2;
  color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

.card-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  padding-top: 4%;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.card-competition {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(0.5rem, 1.3vw, 0.7rem);
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}

.card-hashtag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(0.5rem, 1.3vw, 0.7rem);
  font-weight: 700;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.35);
}

/* DOWNLOAD BTN */
.download-btn {
  display: block;
  width: 100%;
  max-width: 560px;
  margin: 16px auto 0;
  padding: 13px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.download-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

@media (max-width: 800px) {
  .app { grid-template-columns: 1fr; padding: 0 16px; }
  .form-panel { position: static; }
  nav { padding: 14px 20px; }
}
</style>
</head>

<div class="app">
  <!-- FORM -->
  <div class="form-panel">
    <h2>⚙ Match Details</h2>

    <div class="section-label">Your Club</div>
    <div class="field">
      <label>Club Name</label>
      <input type="text" id="clubName" value="Hereford RFC" oninput="updateCard()">
    </div>
    <div class="field">
      <label>Club Colours</label>
      <div class="color-row">
        <div class="color-field">
          <input type="color" id="color1" value="#c8102e" oninput="updateCard()">
          <span>Primary</span>
        </div>
        <div class="color-field">
          <input type="color" id="color2" value="#1a1a1a" oninput="updateCard()">
          <span>Secondary</span>
        </div>
      </div>
    </div>

    <div class="section-label">Score</div>
    <div class="field">
      <div class="score-row">
        <div>
          <label>Your Score</label>
          <input type="number" id="homeScore" value="28" min="0" oninput="updateCard()">
        </div>
        <div class="vs">–</div>
        <div>
          <label>Opp. Score</label>
          <input type="number" id="awayScore" value="14" min="0" oninput="updateCard()">
        </div>
      </div>
    </div>

    <div class="field">
      <label>Opponent Name</label>
      <input type="text" id="opponent" value="Worcester RFC" oninput="updateCard()">
    </div>

    <div class="field">
      <label>Result</label>
      <div class="result-toggle">
        <button class="result-btn win active" onclick="setResult('WIN', this)">Win</button>
        <button class="result-btn loss" onclick="setResult('LOSS', this)">Loss</button>
        <button class="result-btn draw" onclick="setResult('DRAW', this)">Draw</button>
      </div>
    </div>

    <div class="section-label">Extra Details</div>
    <div class="field">
      <label>Competition / League</label>
      <input type="text" id="competition" value="Midlands 2 West" oninput="updateCard()">
    </div>
    <div class="field">
      <label>Match Date</label>
      <input type="text" id="matchDate" value="Saturday 1 March 2025" oninput="updateCard()">
    </div>
    <div class="field">
      <label>Custom Message (optional)</label>
      <input type="text" id="message" placeholder="e.g. What a performance!" oninput="updateCard()">
    </div>
    <div class="field">
      <label>Hashtag</label>
      <input type="text" id="hashtag" value="#COYR" oninput="updateCard()">
    </div>

    <button class="generate-btn" onclick="downloadCard()">⬇ Download Image</button>
  </div>

<script>
let currentResult = 'WIN';

const RESULT_COLORS = {
  WIN: '#2ecc71',
  LOSS: '#c8102e',
  DRAW: '#d4a843'
};

const RESULT_MESSAGES = {
  WIN: ['FULL TIME', 'FINAL SCORE', 'MATCH RESULT'],
  LOSS: ['FINAL SCORE', 'FULL TIME', 'MATCH RESULT'],
  DRAW: ['FINAL SCORE', 'FULL TIME', 'MATCH RESULT']
};

function setResult(result, btn) {
  currentResult = result;
  document.querySelectorAll('.result-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateCard();
}

function drawDiagonal() {
  const card = document.getElementById('match-card');
  const canvas = document.getElementById('cardCanvas');
  const c1 = document.getElementById('color1').value;
  const c2 = document.getElementById('color2').value;

  canvas.width = card.offsetWidth;
  canvas.height = card.offsetHeight;
  const ctx = canvas.getContext('2d');

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  bg.addColorStop(0, c2);
  bg.addColorStop(1, adjustColor(c2, -20));
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Diagonal accent slice
  ctx.beginPath();
  ctx.moveTo(0, canvas.height * 0.35);
  ctx.lineTo(canvas.width * 0.65, 0);
  ctx.lineTo(canvas.width, 0);
  ctx.lineTo(canvas.width, canvas.height * 0.08);
  ctx.lineTo(canvas.width * 0.15, canvas.height);
  ctx.lineTo(0, canvas.height);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, canvas.width * 0.6, canvas.height);
  grad.addColorStop(0, c1 + 'cc');
  grad.addColorStop(1, c1 + '44');
  ctx.fillStyle = grad;
  ctx.fill();

  // Subtle grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i < canvas.width; i += 30) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
  }
  for (let i = 0; i < canvas.height; i += 30) {
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
  }
}

function adjustColor(hex, amt) {
  const num = parseInt(hex.slice(1), 16);
  const r = Math.max(0, Math.min(255, (num >> 16) + amt));
  const g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + amt));
  const b = Math.max(0, Math.min(255, (num & 0xff) + amt));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function updateCard() {
  const club = document.getElementById('clubName').value || 'Your Club';
  const opp = document.getElementById('opponent').value || 'Opposition';
  const homeScore = document.getElementById('homeScore').value;
  const awayScore = document.getElementById('awayScore').value;
  const comp = document.getElementById('competition').value;
  const date = document.getElementById('matchDate').value;
  const msg = document.getElementById('message').value;
  const hashtag = document.getElementById('hashtag').value;
  const c1 = document.getElementById('color1').value;

  document.getElementById('cardClubName').textContent = club;
  document.getElementById('cardHomeTeam').textContent = club;
  document.getElementById('cardAwayTeam').textContent = opp;
  document.getElementById('cardHomeScore').textContent = homeScore;
  document.getElementById('cardHomeScore').style.color = c1;
  document.getElementById('cardAwayScore').textContent = awayScore;
  document.getElementById('cardMeta').textContent = [date, comp].filter(Boolean).join(' · ');
  document.getElementById('cardComp').textContent = comp;
  document.getElementById('cardHashtag').textContent = hashtag;
  document.getElementById('cardMessage').textContent = msg;

  const badge = document.getElementById('cardResultBadge');
  badge.textContent = currentResult;
  badge.style.background = RESULT_COLORS[currentResult];
  badge.style.color = '#fff';

  drawDiagonal();
}

async function downloadCard() {
  const card = document.getElementById('match-card');
  // Temporarily fix size for export
  const origW = card.style.width;
  card.style.width = '1080px';
  card.style.height = '1080px';
  drawDiagonal();

  await new Promise(r => setTimeout(r, 100));

  const canvas = await html2canvas(card, {
    scale: 1,
    useCORS: true,
    allowTaint: true,
    backgroundColor: null,
    width: 1080,
    height: 1080
  });

  card.style.width = origW;
  card.style.height = '';
  drawDiagonal();

  const link = document.createElement('a');
  const club = document.getElementById('clubName').value.replace(/\s+/g, '_') || 'club';
  link.download = club + '_match_result.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Init
window.addEventListener('load', () => {
  setTimeout(updateCard, 200);
});
window.addEventListener('resize', drawDiagonal);
</script>
