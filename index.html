// Returns a sorted array of hex colour candidates from an image (most prominent first)
function extractPaletteFromImage(imgEl) {
  const canvas = document.createElement("canvas");
  const size = 100; canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(imgEl, 0, 0, size, size);
  const data = ctx.getImageData(0, 0, size, size).data;
  const colorMap = {};
  for (let i = 0; i < data.length; i += 4) {
    const r=data[i],g=data[i+1],b=data[i+2],a=data[i+3];
    if (a<128) continue;
    // Quantise to 24-step grid for a richer palette
    const key=`${Math.round(r/24)*24},${Math.round(g/24)*24},${Math.round(b/24)*24}`;
    colorMap[key]=(colorMap[key]||0)+1;
  }
  const toHex=key=>"#"+key.split(",").map(x=>Math.min(255,parseInt(x)).toString(16).padStart(2,"0")).join("");
  // Remove near-white and near-black, keep everything else
  const isNeutral=key=>{const[r,g,b]=key.split(",").map(Number);const l=(r+g+b)/3;return l>210||l<30;};
  return Object.entries(colorMap)
    .filter(([k])=>!isNeutral(k))
    .sort((a,b)=>b[1]-a[1])
    .map(([k])=>toHex(k));
}

// Given a palette array and a current offset, find the next valid (primary, secondary) pair
// Rule: one must be "light" (luminance > 0.45) and the other "dark" (luminance <= 0.45)
function pickContrastingPair(palette, offset=0) {
  const isLight = hex => luminance(hex) > 0.45;
  // Try every combination in order of prominence, starting from offset
  let tried = 0;
  for (let i = offset; tried < palette.length * palette.length; i++) {
    const pi = i % palette.length;
    for (let j = 0; j < palette.length; j++) {
      if (j === pi) continue;
      const p = palette[pi], s = palette[j];
      if (isLight(p) !== isLight(s)) { // one light, one dark — valid pair
        return { primary: p, secondary: s, nextOffset: (pi + 1) % palette.length };
      }
    }
    tried++;
  }
  // Fallback if palette is all same tone
  return { primary: palette[0]||"#1a3a2a", secondary: palette[1]||"#c8a84b", nextOffset: 0 };
}

function luminance(hex){const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;return 0.299*r+0.587*g+0.114*b;}
function ctxt(bg){return luminance(bg)>0.5?"#111111":"#ffffff";}

// ── SHARED BACKGROUND PHOTO LAYER ────────────────────────────────
function BgPhoto({ photo, primary, opacity=1, blur=0 }) {
  if (!photo) return null;
  return (
    <>
      <img src={photo} style={{
        position:"absolute", inset:0, width:"100%", height:"100%",
        objectFit:"cover", zIndex:0, pointerEvents:"none",
        opacity, filter: blur>0 ? `blur(${blur}px)` : "none",
        transform: blur>0 ? "scale(1.05)" : "none", // prevent blur edge bleed
      }}/>
      <div style={{
        position:"absolute", inset:0, zIndex:1, pointerEvents:"none",
        background:`linear-gradient(to top, ${primary}f0 0%, ${primary}b0 40%, ${primary}70 70%, ${primary}44 100%)`
      }}/>
    </>
  );
}

// ── SHARED SUB-COMPONENTS ────────────────────────────────────────

function InfoPill({label,value,colors}){
  return <div>
    <div style={{fontSize:10,color:colors.secondary,letterSpacing:2,textTransform:"uppercase"}}>{label}</div>
    <div style={{color:"#fff",fontSize:14,fontWeight:600,textShadow:"0 1px 4px rgba(0,0,0,0.6)"}}>{value}</div>
  </div>;
}

function StatBlock({label,value,colors}){
  return <div style={{background:"rgba(0,0,0,0.45)",backdropFilter:"blur(4px)",borderRadius:8,padding:"9px 11px",border:"1px solid rgba(255,255,255,0.08)"}}>

    <div style={{fontSize:13,color:"#fff",whiteSpace:"pre-line"}}>{value}</div>
  </div>;
}

                <div key={i} style={{display:"flex",alignItems:"center",borderRadius:4,overflow:"hidden",position:"relative",zIndex:4}}>
                  <div style={{width:28,flexShrink:0,background:secondary,display:"flex",alignItems:"center",justifyContent:"center",alignSelf:"stretch"}}>
                    <span style={{fontSize:11,fontWeight:800,color:txtS}}>{i+1}</span>
                  </div>
                  <div style={{flex:1,background:"rgba(0,0,0,0.55)",borderBottom:"1px solid rgba(255,255,255,0.05)",padding:"5px 10px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{fontSize:12,fontWeight:600,color:"#eee",letterSpacing:0.3}}>{p.name||<span style={{opacity:0.15,fontSize:11}}>TBC</span>}</span>
                    {badge&&<span style={{fontSize:10,fontWeight:800,color:secondary,marginLeft:6}}>{badge}</span>}
                  </div>
                </div>
              );
            })}
          </div>
          <RepsList/>
        </div>
      </div>
    );
  }

  // Variant 1
  return(
    <div style={{width:dims.w,height:dims.h,background:primary,position:"relative",fontFamily:font,overflow:"hidden",borderRadius:12}}>
      <BgPhoto photo={photo} primary={primary} opacity={bgOpacity} blur={bgBlur}/>
      <div style={{position:"absolute",left:-6,top:90,width:10,height:56,background:secondary,borderRadius:2,zIndex:3}}/>
      <div style={{position:"absolute",left:-6,top:156,width:10,height:28,background:secondary,opacity:0.45,borderRadius:2,zIndex:3}}/>
      <div style={{position:"absolute",top:0,left:0,right:0,height:5,background:secondary,zIndex:3}}/>
      <div style={{padding:"18px 22px 14px",display:"flex",flexDirection:"column",height:"100%",boxSizing:"border-box",position:"relative",zIndex:3}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div>
            <div style={{fontSize:38,fontWeight:900,color:"#fff",lineHeight:1,letterSpacing:-1,textTransform:"uppercase",textShadow:"0 2px 8px rgba(0,0,0,0.8)"}}>Starting <span style={{color:secondary}}>XV</span></div>
            {(data.teamName||data.opponent||data.date)&&<div style={{fontSize:12,color:"#ccc",opacity:0.7,marginTop:3,letterSpacing:0.5}}>{data.teamName&&<span style={{fontWeight:600,opacity:1,color:"#fff"}}>{data.teamName}</span>}{data.opponent&&<span> vs {data.opponent}</span>}{data.date&&<span> · {data.date}</span>}</div>}
          </div>
          {logo&&<img src={logo} style={{height:54,width:54,objectFit:"contain",filter:"drop-shadow(0 2px 12px rgba(0,0,0,0.8))"}}/>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:3,flex:1}}>
          {starters.map((p,i)=><PlayerRow key={i} p={p} i={i}/>)}
        </div>
        <RepsList/>
      </div>
    </div>
  );
}

// ── FORM HELPERS ──────────────────────────────────────────────────

function Field({label,value,onChange,placeholder,multiline}){
  const s={width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"9px 11px",color:"#f0f0f0",fontSize:14,fontFamily:"inherit",boxSizing:"border-box",outline:"none",resize:multiline?"vertical":"none"};
  return(
    <div style={{marginBottom:10}}>
      <label style={{display:"block",fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#777",marginBottom:4}}>{label}</label>
      {multiline?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={3} style={s}/>:<input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={s}/>}
    </div>
  );
}

function Toggle({label,checked,onChange}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,cursor:"pointer"}} onClick={()=>onChange(!checked)}>
      <div style={{width:38,height:20,borderRadius:10,background:checked?"#4ade80":"rgba(255,255,255,0.15)",position:"relative",transition:"background 0.2s",flexShrink:0}}>
        <div style={{position:"absolute",top:2,left:checked?20:2,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
      </div>
      <span style={{fontSize:13,color:"#ccc"}}>{label}</span>
    </div>
  );
}

function PhotoUpload({photo, onUpload, onClear, inputRef, opacity, blur, onOpacity, onBlur}){
  const sliderStyle={width:"100%",accentColor:"#4ade80",cursor:"pointer",height:4};
  return(
    <div style={{marginBottom:14,padding:"12px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10}}>
      <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#555",marginBottom:8}}>Background Photo</div>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom: photo ? 10 : 0}}>
        <button onClick={()=>inputRef.current?.click()} style={{flex:1,background:photo?"rgba(74,222,128,0.08)":"rgba(255,255,255,0.05)",border:photo?"1px solid rgba(74,222,128,0.3)":"1px dashed rgba(255,255,255,0.16)",borderRadius:8,padding:"10px",color:photo?"#4ade80":"#aaa",cursor:"pointer",fontSize:13,textAlign:"left"}}>
          {photo?"✅ Photo uploaded — tap to change":"📷 Upload background photo"}
        </button>
        {photo&&<>
          <img src={photo} style={{height:44,width:44,objectFit:"cover",borderRadius:6,border:"1px solid rgba(255,255,255,0.1)"}}/>
          <button onClick={onClear} style={{background:"rgba(248,113,113,0.15)",border:"none",borderRadius:6,color:"#f87171",cursor:"pointer",padding:"8px 10px",fontSize:13,lineHeight:1}}>✕</button>
        </>}
        <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={onUpload}/>
      </div>
      {photo&&<>
        <div style={{marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <label style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#666"}}>Opacity</label>
            <span style={{fontSize:10,color:"#888"}}>{Math.round(opacity*100)}%</span>
          </div>
          <input type="range" min={0.1} max={1} step={0.05} value={opacity} onChange={e=>onOpacity(parseFloat(e.target.value))} style={sliderStyle}/>
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <label style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#666"}}>Blur</label>
            <span style={{fontSize:10,color:"#888"}}>{blur}px</span>
          </div>
          <input type="range" min={0} max={20} step={1} value={blur} onChange={e=>onBlur(parseInt(e.target.value))} style={sliderStyle}/>
        </div>
      </>}
    </div>
  );
}

function SquadPlayerField({pos,player,onNameChange,onCaptain,onVice,colors}){
  const btnBase={border:"none",borderRadius:5,fontSize:10,fontWeight:800,cursor:"pointer",padding:"4px 7px",letterSpacing:1,transition:"all 0.15s"};
  return(
    <div style={{marginBottom:7}}>
      <label style={{display:"block",fontSize:9,letterSpacing:2,textTransform:"uppercase",color:"#555",marginBottom:3}}>{pos}</label>
      <div style={{display:"flex",gap:5,alignItems:"center"}}>
        <input value={player.name} onChange={e=>onNameChange(e.target.value)} placeholder="Player name" style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"8px 10px",color:"#f0f0f0",fontSize:13,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
        <button onClick={onCaptain} style={{...btnBase,background:player.captain?colors.secondary:"rgba(255,255,255,0.08)",color:player.captain?ctxt(colors.secondary):"#777"}}>C</button>
        <button onClick={onVice} style={{...btnBase,background:player.vice?colors.secondary:"rgba(255,255,255,0.08)",color:player.vice?ctxt(colors.secondary):"#777"}}>VC</button>
      </div>
    </div>
  );
}

function TemplatePicker({value,onChange,colors}){
  return(
    <div style={{marginBottom:14}}>
      <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#555",marginBottom:7}}>Template Style</div>
      <div style={{display:"flex",gap:6}}>
        {[1,2,3].map(n=>(
          <button key={n} onClick={()=>onChange(n)} style={{flex:1,padding:"9px 4px",borderRadius:8,border:value===n?`1px solid ${colors.secondary}`:"1px solid rgba(255,255,255,0.09)",background:value===n?`${colors.secondary}22`:"rgba(255,255,255,0.04)",color:value===n?colors.secondary:"#777",cursor:"pointer",fontSize:12,fontWeight:value===n?700:400}}>
            Style {n}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────

const POSITIONS=["1 - Loosehead Prop","2 - Hooker","3 - Tighthead Prop","4 - Lock","5 - Lock","6 - Blindside Flanker","7 - Openside Flanker","8 - Number 8","9 - Scrum Half","10 - Fly Half","11 - Left Wing","12 - Inside Centre","13 - Outside Centre","14 - Right Wing","15 - Full Back","16 - Replacement","17 - Replacement","18 - Replacement","19 - Replacement","20 - Replacement","21 - Replacement","22 - Replacement","23 - Replacement"];

function RugbySocialGenerator(){
  const [tab,setTab]=useState("fixture");
  const [colors,setColors]=useState(DEFAULT_COLORS);
  const [logo,setLogo]=useState(null);
  const [autoColor,setAutoColor]=useState(false);
  const [fontId,setFontId]=useState("cinzel");
  const [format,setFormat]=useState("portrait");
  const [templates,setTemplates]=useState({fixture:1,result:1,player:1,announcement:1,motm:1,dotd:1});
  // Per-tab background photos
  const [photos,setPhotos]=useState({fixture:null,result:null,player:null,announcement:null,motm:null,dotd:null});
  const [palette,setPalette]=useState([]);
  const [paletteOffset,setPaletteOffset]=useState(0);
  const [bgSettings,setBgSettings]=useState({
    fixture:{opacity:1,blur:0}, result:{opacity:1,blur:0},
    player:{opacity:1,blur:0}, announcement:{opacity:1,blur:0},
    motm:{opacity:1,blur:0}, dotd:{opacity:1,blur:0}
  });

  const logoInputRef=useRef();
  const photoRefs={fixture:useRef(),result:useRef(),player:useRef(),announcement:useRef(),motm:useRef(),dotd:useRef()};
  const cardRef=useRef();

  const [fixture,setFixture]=useState({homeTeam:"",awayTeam:"",date:"",kickoff:"",venue:"",competition:""});
  const [result,setResult]=useState({ourTeam:"",opponent:"",homeScore:"",awayScore:"",isHome:true,date:"",competition:"",motm:"",tries:"",conversions:"",penalties:"",showDotd:false,dotd:""});
  const [player,setPlayer]=useState({playerName:"",position:"",shirtNumber:"",caps:"",tries:"",age:"",hometown:"",quote:""});
  const [announcement,setAnnouncement]=useState({teamName:"",opponent:"",date:"",players:Array(23).fill(null).map(()=>({name:"",captain:false,vice:false}))});
  const [motm,setMotm]=useState({playerName:"",position:"",shirtNumber:"",caps:"",tries:"",age:"",hometown:"",reason:""});
  const [dotd,setDotd]=useState({playerName:"",position:"",shirtNumber:"",caps:"",tries:"",age:"",hometown:"",reason:"",awardName:"Dick of the Day",swapColors:true});

  const activeFont=FONT_OPTIONS.find(f=>f.id===fontId)?.stack||FONT_OPTIONS[0].stack;
  const tmpl=templates[tab];
  const dims=FORMATS[format];
  const currentPhoto=photos[tab];
  const currentBg=bgSettings[tab];
  const setBgOpacity=v=>setBgSettings(s=>({...s,[tab]:{...s[tab],opacity:v}}));
  const setBgBlur=v=>setBgSettings(s=>({...s,[tab]:{...s[tab],blur:v}}));

  useEffect(()=>{
    const params=FONT_OPTIONS.map(f=>`family=${f.import}`).join("&");
    const old=document.getElementById("rugby-gfonts");if(old)old.remove();
    const link=document.createElement("link");link.id="rugby-gfonts";link.rel="stylesheet";
    link.href=`https://fonts.googleapis.com/css2?${params}&display=swap`;
    document.head.appendChild(link);
  },[]);

  const handleLogoUpload=e=>{
    const file=e.target.files[0];if(!file)return;
    const url=URL.createObjectURL(file);setLogo(url);
    if(autoColor){
      const img=new Image();img.crossOrigin="anonymous";
      img.onload=()=>{
        const pal=extractPaletteFromImage(img);
        setPalette(pal);setPaletteOffset(0);
        const {primary,secondary}=pickContrastingPair(pal,0);
        setColors(c=>({...c,primary,secondary}));
      };
      img.src=url;
    }
  };

  useEffect(()=>{
    if(autoColor&&logo){
      const img=new Image();img.crossOrigin="anonymous";
      img.onload=()=>{
        const pal=extractPaletteFromImage(img);
        setPalette(pal);setPaletteOffset(0);
        const {primary,secondary}=pickContrastingPair(pal,0);
        setColors(c=>({...c,primary,secondary}));
      };
      img.src=logo;
    }
  },[autoColor]);

  const shuffleColors=()=>{
    if(!palette.length)return;
    const {primary,secondary,nextOffset}=pickContrastingPair(palette,paletteOffset);
    setColors(c=>({...c,primary,secondary}));
    setPaletteOffset(nextOffset);
  };

  const handlePhotoUpload=t=>e=>{
    const file=e.target.files[0];if(!file)return;
    setPhotos(p=>({...p,[t]:URL.createObjectURL(file)}));
    e.target.value="";
  };
  const clearPhoto=t=>setPhotos(p=>({...p,[t]:null}));

  const downloadCard=async()=>{
    const node=cardRef.current;if(!node)return;
    try{
      const h2c=window.html2canvas;
      if(!h2c){alert("Capture library not loaded yet — please wait a moment and try again.");return;}
      const canvas=await h2c(node,{scale:2,useCORS:true,allowTaint:true,backgroundColor:null,logging:false});
      const a=document.createElement("a");a.download=`${tab}-card.png`;a.href=canvas.toDataURL("image/png");a.click();
    }catch(e){console.error(e);alert("Download failed — try right-clicking the preview and saving the image instead.");}
  };

  const updateSquadPlayer=(i,field,val)=>{
    const p=announcement.players.map((pl,idx)=>{
      if(idx!==i){
        if(field==="captain"&&val)return{...pl,captain:false};
        if(field==="vice"&&val)return{...pl,vice:false};
        return pl;
      }
      return{...pl,[field]:val};
    });
    setAnnouncement(a=>({...a,players:p}));
  };

  const tabs=[
    {id:"fixture",label:"⚡ Fixture"},
    {id:"result",label:"🏉 Result"},
    {id:"player",label:"👤 Player"},
    {id:"announcement",label:"📋 Team Sheet"},
    {id:"motm",label:"⭐ Man of Match"},
    {id:"dotd",label:"🐥 "+( dotd.awardName||"Dick of Day")},
  ];

  // DOTD optionally swaps primary ↔ secondary
  const dotdColors = dotd.swapColors
    ? {...colors, primary:colors.secondary, secondary:colors.primary}
    : colors;

  const setTmpl=v=>setTemplates(t=>({...t,[tab]:v}));

  return(
    <div style={{minHeight:"100vh",background:"#0d1117",color:"#f0f0f0",fontFamily:activeFont,display:"flex",flexDirection:"column"}}>
      <div style={{background:"#161b22",borderBottom:"1px solid #30363d",padding:"15px 26px",display:"flex",alignItems:"center",gap:14}}>
        <div style={{fontSize:26}}>🏉</div>
        <div>
          <div style={{fontSize:19,fontWeight:700,letterSpacing:1}}>Rugby Social Generator</div>
          <div style={{fontSize:10,color:"#777",letterSpacing:3,textTransform:"uppercase"}}>Match-day content in seconds</div>
        </div>
      </div>

      <div style={{display:"flex",flex:1,flexWrap:"wrap"}}>
        {/* LEFT PANEL */}
        <div style={{width:340,minWidth:300,background:"#161b22",borderRight:"1px solid #30363d",padding:20,overflowY:"auto",maxHeight:"calc(100vh - 62px)"}}>

          {/* Club Setup */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:10,letterSpacing:3,textTransform:"uppercase",color:"#555",marginBottom:10}}>Club Setup</div>
            <div style={{display:"flex",gap:10,marginBottom:10,alignItems:"center"}}>
              <button onClick={()=>logoInputRef.current?.click()} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px dashed rgba(255,255,255,0.16)",borderRadius:8,padding:"10px",color:"#aaa",cursor:"pointer",fontSize:13}}>
                {logo?"✅ Logo uploaded":"📁 Upload club logo"}
              </button>
              {logo&&<img src={logo} style={{height:36,width:36,objectFit:"contain",borderRadius:6}}/>}
              <input ref={logoInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleLogoUpload}/>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
              <div style={{flex:1}}><Toggle label="Auto-detect colours from logo" checked={autoColor} onChange={setAutoColor}/></div>
              {autoColor&&palette.length>0&&(
                <button onClick={shuffleColors} title="Try a different colour combination" style={{flexShrink:0,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:7,padding:"5px 10px",color:"#ccc",cursor:"pointer",fontSize:15,lineHeight:1,marginBottom:10}}>🔀</button>
              )}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
              {[["primary","Primary"],["secondary","Secondary"],["accent","Accent"]].map(([k,l])=>(
                <div key={k}>
                  <div style={{fontSize:9,color:"#666",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>{l}</div>
                  <input type="color" value={colors[k]} disabled={autoColor} onChange={e=>setColors(c=>({...c,[k]:e.target.value}))} style={{width:"100%",height:32,border:"none",borderRadius:6,cursor:autoColor?"not-allowed":"pointer",background:"none",padding:0}}/>
                </div>
              ))}
            </div>
            {autoColor&&<div style={{fontSize:11,color:"#555",marginTop:4,marginBottom:8,fontStyle:"italic"}}>Colours auto-extracted · primary &amp; secondary always contrast · hit 🔀 to try another combo</div>}

            {/* Format */}
            <div style={{marginTop:6}}>
              <div style={{fontSize:10,color:"#555",letterSpacing:2,textTransform:"uppercase",marginBottom:7}}>Format</div>
              <div style={{display:"flex",gap:5}}>
                {Object.entries(FORMATS).map(([id,f])=>(
                  <button key={id} onClick={()=>setFormat(id)} style={{flex:1,padding:"8px 4px",borderRadius:8,border:format===id?`1px solid ${colors.secondary}`:"1px solid rgba(255,255,255,0.09)",background:format===id?`${colors.secondary}1f`:"rgba(255,255,255,0.03)",color:format===id?colors.secondary:"#aaa",cursor:"pointer",fontSize:11,textAlign:"center"}}>
                    <div style={{fontWeight:format===id?700:400}}>{f.label.split("·")[0].trim()}</div>
                    <div style={{fontSize:9,opacity:0.6,marginTop:1}}>{f.tag}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* Font */}
            <div style={{marginTop:14}}>
              <div style={{fontSize:10,color:"#555",letterSpacing:2,textTransform:"uppercase",marginBottom:7}}>Font Style</div>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {FONT_OPTIONS.map(f=>(
                  <button key={f.id} onClick={()=>setFontId(f.id)} style={{textAlign:"left",padding:"9px 12px",borderRadius:8,border:fontId===f.id?`1px solid ${colors.secondary}`:"1px solid rgba(255,255,255,0.09)",background:fontId===f.id?`${colors.secondary}1f`:"rgba(255,255,255,0.03)",color:fontId===f.id?colors.secondary:"#aaa",cursor:"pointer",fontSize:13,fontFamily:f.stack}}>
                    {f.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Card tabs */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:16}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"8px 5px",borderRadius:8,border:"none",background:tab===t.id?colors.secondary:"rgba(255,255,255,0.05)",color:tab===t.id?ctxt(colors.secondary):"#aaa",cursor:"pointer",fontSize:12,fontWeight:tab===t.id?700:400,transition:"all 0.15s",fontFamily:activeFont}}>
                {t.label}
              </button>
            ))}
          </div>

          <TemplatePicker value={tmpl} onChange={setTmpl} colors={colors}/>

          {/* Photo upload — shown on every tab */}
          <PhotoUpload
            photo={currentPhoto}
            onUpload={handlePhotoUpload(tab)}
            onClear={()=>clearPhoto(tab)}
            inputRef={photoRefs[tab]}
            opacity={currentBg.opacity}
            blur={currentBg.blur}
            onOpacity={setBgOpacity}
            onBlur={setBgBlur}
          />

          {/* FIXTURE */}
          {tab==="fixture"&&<>
            <Field label="Home Team" value={fixture.homeTeam} onChange={v=>setFixture(f=>({...f,homeTeam:v}))} placeholder="Scarlets"/>
            <Field label="Away Team" value={fixture.awayTeam} onChange={v=>setFixture(f=>({...f,awayTeam:v}))} placeholder="Opponents RFC"/>
            <Field label="Date" value={fixture.date} onChange={v=>setFixture(f=>({...f,date:v}))} placeholder="Sat 8 Mar 2025"/>
            <Field label="Kick-off Time" value={fixture.kickoff} onChange={v=>setFixture(f=>({...f,kickoff:v}))} placeholder="14:30"/>
            <Field label="Venue" value={fixture.venue} onChange={v=>setFixture(f=>({...f,venue:v}))} placeholder="Parc y Scarlets"/>
            <Field label="Competition" value={fixture.competition} onChange={v=>setFixture(f=>({...f,competition:v}))} placeholder="URC"/>
          </>}

          {/* RESULT */}
          {tab==="result"&&<>
            <Field label="Our Team" value={result.ourTeam} onChange={v=>setResult(r=>({...r,ourTeam:v}))} placeholder="Scarlets"/>
            <Field label="Opponent" value={result.opponent} onChange={v=>setResult(r=>({...r,opponent:v}))} placeholder="Opponents RFC"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
              <Field label="Our Score" value={result.homeScore} onChange={v=>setResult(r=>({...r,homeScore:v}))} placeholder="32"/>
              <Field label="Their Score" value={result.awayScore} onChange={v=>setResult(r=>({...r,awayScore:v}))} placeholder="17"/>
            </div>
            <Field label="Date" value={result.date} onChange={v=>setResult(r=>({...r,date:v}))} placeholder="Sat 8 Mar 2025"/>
            <Field label="Competition" value={result.competition} onChange={v=>setResult(r=>({...r,competition:v}))} placeholder="URC"/>
            <Field label="Man of the Match ⭐" value={result.motm} onChange={v=>setResult(r=>({...r,motm:v}))} placeholder="J. Thompson"/>
            <Field label="Try Scorers" value={result.tries} onChange={v=>setResult(r=>({...r,tries:v}))} placeholder="Smith (2), Jones, Brown" multiline/>
            <Field label="Conversions" value={result.conversions} onChange={v=>setResult(r=>({...r,conversions:v}))} placeholder="Williams (4/5)"/>
            <Field label="Penalties" value={result.penalties} onChange={v=>setResult(r=>({...r,penalties:v}))} placeholder="Williams (2)"/>
            <Toggle label="Show Dick of the Day 🐥" checked={result.showDotd} onChange={v=>setResult(r=>({...r,showDotd:v}))}/>
            {result.showDotd&&<Field label="Dick of the Day 🐥" value={result.dotd} onChange={v=>setResult(r=>({...r,dotd:v}))} placeholder="P. Harrison (obvious reasons)"/>}
          </>}

          {/* PLAYER */}
          {tab==="player"&&<>
            <Field label="Player Name" value={player.playerName} onChange={v=>setPlayer(p=>({...p,playerName:v}))} placeholder="Sam Warburton"/>
            <Field label="Position" value={player.position} onChange={v=>setPlayer(p=>({...p,position:v}))} placeholder="Flanker"/>
            <Field label="Shirt Number" value={player.shirtNumber} onChange={v=>setPlayer(p=>({...p,shirtNumber:v}))} placeholder="7"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
              <Field label="Club Caps" value={player.caps} onChange={v=>setPlayer(p=>({...p,caps:v}))} placeholder="142"/>
              <Field label="Tries" value={player.tries} onChange={v=>setPlayer(p=>({...p,tries:v}))} placeholder="34"/>
              <Field label="Age" value={player.age} onChange={v=>setPlayer(p=>({...p,age:v}))} placeholder="27"/>
              <Field label="Hometown" value={player.hometown} onChange={v=>setPlayer(p=>({...p,hometown:v}))} placeholder="Cardiff"/>
            </div>
            <Field label="Player Quote" value={player.quote} onChange={v=>setPlayer(p=>({...p,quote:v}))} placeholder="Every game is a chance to prove yourself." multiline/>
          </>}

          {/* TEAM SHEET */}
          {tab==="announcement"&&<>
            <Field label="Team Name" value={announcement.teamName} onChange={v=>setAnnouncement(a=>({...a,teamName:v}))} placeholder="Scarlets"/>
            <Field label="vs Opponent" value={announcement.opponent} onChange={v=>setAnnouncement(a=>({...a,opponent:v}))} placeholder="Ulster"/>
            <Field label="Date" value={announcement.date} onChange={v=>setAnnouncement(a=>({...a,date:v}))} placeholder="Sat 15 Mar"/>
            <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#555",margin:"12px 0 7px"}}>Starting XV</div>
            {POSITIONS.slice(0,15).map((pos,i)=>(
              <SquadPlayerField key={i} pos={pos} player={announcement.players[i]} onNameChange={v=>updateSquadPlayer(i,"name",v)} onCaptain={()=>updateSquadPlayer(i,"captain",!announcement.players[i].captain)} onVice={()=>updateSquadPlayer(i,"vice",!announcement.players[i].vice)} colors={colors}/>
            ))}
            <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#555",margin:"12px 0 7px"}}>Replacements</div>
            {POSITIONS.slice(15).map((pos,i)=>(
              <SquadPlayerField key={i+15} pos={pos} player={announcement.players[15+i]} onNameChange={v=>updateSquadPlayer(15+i,"name",v)} onCaptain={()=>updateSquadPlayer(15+i,"captain",!announcement.players[15+i].captain)} onVice={()=>updateSquadPlayer(15+i,"vice",!announcement.players[15+i].vice)} colors={colors}/>
            ))}
          </>}

          {/* MAN OF THE MATCH */}
          {tab==="motm"&&<>
            <Field label="Player Name" value={motm.playerName} onChange={v=>setMotm(m=>({...m,playerName:v}))} placeholder="Sam Warburton"/>
            <Field label="Position" value={motm.position} onChange={v=>setMotm(m=>({...m,position:v}))} placeholder="Flanker"/>
            <Field label="Shirt Number" value={motm.shirtNumber} onChange={v=>setMotm(m=>({...m,shirtNumber:v}))} placeholder="7"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
              <Field label="Club Caps" value={motm.caps} onChange={v=>setMotm(m=>({...m,caps:v}))} placeholder="142"/>
              <Field label="Tries" value={motm.tries} onChange={v=>setMotm(m=>({...m,tries:v}))} placeholder="34"/>
              <Field label="Age" value={motm.age} onChange={v=>setMotm(m=>({...m,age:v}))} placeholder="27"/>
              <Field label="Hometown" value={motm.hometown} onChange={v=>setMotm(m=>({...m,hometown:v}))} placeholder="Cardiff"/>
            </div>
            <Field label="Reason for award" value={motm.reason} onChange={v=>setMotm(m=>({...m,reason:v}))} placeholder="Outstanding breakdown work and 2 tries…" multiline/>
          </>}

          {/* DICK OF THE DAY */}
          {tab==="dotd"&&<>
            <div style={{marginBottom:12,padding:"11px 14px",background:"rgba(248,113,113,0.07)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:10}}>
              <Field label="Award Name" value={dotd.awardName} onChange={v=>setDotd(d=>({...d,awardName:v}))} placeholder="Dick of the Day"/>
              <Toggle label="Swap colours (secondary becomes primary)" checked={dotd.swapColors} onChange={v=>setDotd(d=>({...d,swapColors:v}))}/>
              {dotd.swapColors&&<div style={{fontSize:10,color:"#f87171",opacity:0.7,marginTop:-4,marginBottom:4,fontStyle:"italic"}}>Secondary colour is now the card background</div>}
            </div>
            <Field label="Player Name" value={dotd.playerName} onChange={v=>setDotd(d=>({...d,playerName:v}))} placeholder="P. Harrison"/>
            <Field label="Position" value={dotd.position} onChange={v=>setDotd(d=>({...d,position:v}))} placeholder="Prop"/>
            <Field label="Shirt Number" value={dotd.shirtNumber} onChange={v=>setDotd(d=>({...d,shirtNumber:v}))} placeholder="1"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
              <Field label="Club Caps" value={dotd.caps} onChange={v=>setDotd(d=>({...d,caps:v}))} placeholder="12"/>
              <Field label="Tries" value={dotd.tries} onChange={v=>setDotd(d=>({...d,tries:v}))} placeholder="0"/>
              <Field label="Age" value={dotd.age} onChange={v=>setDotd(d=>({...d,age:v}))} placeholder="34"/>
              <Field label="Hometown" value={dotd.hometown} onChange={v=>setDotd(d=>({...d,hometown:v}))} placeholder="Swansea"/>
            </div>
            <Field label="Reason for award" value={dotd.reason} onChange={v=>setDotd(d=>({...d,reason:v}))} placeholder="Dropped the ball twice, missed a tackle, and somehow argued with the ref…" multiline/>
          </>}

          <button onClick={downloadCard} style={{width:"100%",marginTop:14,padding:"13px",background:colors.secondary,color:ctxt(colors.secondary),border:"none",borderRadius:9,fontSize:14,fontWeight:700,cursor:"pointer",letterSpacing:1,fontFamily:activeFont}}>
            ⬇ Download Card
          </button>
        </div>

        {/* RIGHT PANEL */}
        <div style={{flex:1,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:32,background:"#0d1117",overflowY:"auto",maxHeight:"calc(100vh - 62px)"}}>
          <div style={{paddingTop:tab==="announcement"?0:32}}>
            <div style={{fontSize:10,letterSpacing:3,textTransform:"uppercase",color:"#333",textAlign:"center",marginBottom:16}}>Live Preview</div>
            <div ref={cardRef} style={{boxShadow:"0 20px 60px rgba(0,0,0,0.6)",borderRadius:12}}>
              {tab==="fixture"&&tmpl===1&&<FixtureCard1 data={fixture} colors={colors} logo={logo} font={activeFont} photo={currentPhoto} bgOpacity={currentBg.opacity} bgBlur={currentBg.blur} dims={dims}/>}
              {tab==="fixture"&&tmpl===2&&<FixtureCard2 data={fixture} colors={colors} logo={logo} font={activeFont} photo={currentPhoto} bgOpacity={currentBg.opacity} bgBlur={currentBg.blur} dims={dims}/>}
              {tab==="fixture"&&tmpl===3&&<FixtureCard3 data={fixture} colors={colors} logo={logo} font={activeFont} photo={currentPhoto} bgOpacity={currentBg.opacity} bgBlur={currentBg.blur} dims={dims}/>}
              {tab==="result"&&<ResultCardBase data={result} colors={colors} logo={logo} font={activeFont} variant={tmpl} photo={currentPhoto} bgOpacity={currentBg.opacity} bgBlur={currentBg.blur} dims={dims}/>}
              {tab==="player"&&tmpl===1&&<PlayerCard1 data={player} colors={colors} logo={logo} font={activeFont} photo={currentPhoto} bgOpacity={currentBg.opacity} bgBlur={currentBg.blur} dims={dims}/>}
              {tab==="player"&&tmpl===2&&<PlayerCard2 data={player} colors={colors} logo={logo} font={activeFont} photo={currentPhoto} bgOpacity={currentBg.opacity} bgBlur={currentBg.blur} dims={dims}/>}
              {tab==="player"&&tmpl===3&&<PlayerCard3 data={player} colors={colors} logo={logo} font={activeFont} photo={currentPhoto} bgOpacity={currentBg.opacity} bgBlur={currentBg.blur} dims={dims}/>}
              {tab==="announcement"&&<TeamAnnouncementCard data={announcement} colors={colors} logo={logo} font={activeFont} variant={tmpl} photo={currentPhoto} bgOpacity={currentBg.opacity} bgBlur={currentBg.blur} dims={dims}/>}
              {tab==="motm"&&tmpl===1&&<AwardCard1 data={motm} awardLabel="Man of the Match ⭐" colors={colors} logo={logo} font={activeFont} photo={currentPhoto} bgOpacity={currentBg.opacity} bgBlur={currentBg.blur} dims={dims}/>}
              {tab==="motm"&&tmpl===2&&<AwardCard2 data={motm} awardLabel="Man of the Match ⭐" colors={colors} logo={logo} font={activeFont} photo={currentPhoto} bgOpacity={currentBg.opacity} bgBlur={currentBg.blur} dims={dims}/>}
              {tab==="motm"&&tmpl===3&&<AwardCard3 data={motm} awardLabel="Man of the Match ⭐" colors={colors} logo={logo} font={activeFont} photo={currentPhoto} bgOpacity={currentBg.opacity} bgBlur={currentBg.blur} dims={dims}/>}
              {tab==="dotd"&&tmpl===1&&<AwardCard1 data={dotd} awardLabel={dotd.awardName||"Dick of the Day"} colors={dotdColors} logo={logo} font={activeFont} photo={currentPhoto} bgOpacity={currentBg.opacity} bgBlur={currentBg.blur} dims={dims}/>}
              {tab==="dotd"&&tmpl===2&&<AwardCard2 data={dotd} awardLabel={dotd.awardName||"Dick of the Day"} colors={dotdColors} logo={logo} font={activeFont} photo={currentPhoto} bgOpacity={currentBg.opacity} bgBlur={currentBg.blur} dims={dims}/>}
              {tab==="dotd"&&tmpl===3&&<AwardCard3 data={dotd} awardLabel={dotd.awardName||"Dick of the Day"} colors={dotdColors} logo={logo} font={activeFont} photo={currentPhoto} bgOpacity={currentBg.opacity} bgBlur={currentBg.blur} dims={dims}/>}
            </div>
            <div style={{textAlign:"center",marginTop:12,marginBottom:24,fontSize:11,color:"#2a2a2a"}}>Instagram / Twitter ready · 1080px equivalent</div>
          </div>
        </div>
      </div>
    </div>
  );
}
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RugbySocialGenerator />);
  </script>
</body>
</html>
